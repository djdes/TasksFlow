name: Deploy to production

on:
  push:
    branches: [master]

env:
  APP_DIR: /var/www/wesetupru/data/www/wesetup.ru/app
  NODE_VERSION: "20"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare CI env for build
        run: |
          if [ -n "${{ secrets.DATABASE_URL }}" ]; then
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env
          else
            echo "DATABASE_URL=postgresql://postgres:postgres@127.0.0.1:5432/postgres" >> .env
          fi

      - name: Generate Prisma client for CI build
        run: npx prisma generate

      - name: Build app in CI
        run: |
          echo "${{ github.sha }}" > .build-sha
          echo "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > .build-time
          npm run build

      - name: Create deploy tarball
        run: |
          tar cf deploy.tar \
            --exclude=node_modules \
            --exclude=.git \
            --exclude=.github \
            --exclude=.claude \
            --exclude=.vscode \
            --exclude=_run.py \
            --exclude=_deploy.py \
            --exclude=_seed_remote.py \
            --exclude=haccp-deploy.tar \
            --exclude='*.tar' \
            --exclude='*.tar.gz' \
            --exclude=test.txt \
            .

      - name: Prepare app directory
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          password: ${{ secrets.DEPLOY_SSH_PASS }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          script: |
            mkdir -p ${{ env.APP_DIR }}
            # Backup .env if it exists
            [ -f ${{ env.APP_DIR }}/.env ] && cp ${{ env.APP_DIR }}/.env ${{ env.APP_DIR }}/.env.bak || true

      - name: Upload tarball via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          password: ${{ secrets.DEPLOY_SSH_PASS }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          source: deploy.tar
          target: ${{ env.APP_DIR }}

      - name: Run deploy commands
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          password: ${{ secrets.DEPLOY_SSH_PASS }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          timeout: 600s
          command_timeout: 10m
          script: |
            set -eo pipefail
            cd ${{ env.APP_DIR }}

            echo "=== Extracting tarball ==="
            tar xf deploy.tar && rm deploy.tar
            # Restore .env from backup if it exists
            [ -f .env.bak ] && cp .env.bak .env || true

            echo "=== Installing runtime dependencies ==="
            [ -s ~/.nvm/nvm.sh ] && . ~/.nvm/nvm.sh || true
            npm ci --omit=dev 2>&1 | tail -5

            echo "=== Generating Prisma client ==="
            npx prisma generate 2>&1 | tail -5

            echo "=== Pushing schema to DB ==="
            npx prisma db push 2>&1 | tail -5

            echo "=== Seeding journal templates ==="
            if [ -f .env ]; then
              set -a
              . ./.env
              set +a
              npx --yes tsx prisma/seed.ts 2>&1 | tail -20 || echo "Seed failed, continue deploy"
            else
              echo ".env not found, skip seed"
            fi

            echo "=== Restarting PM2 ==="
            npx pm2 delete haccp-online 2>/dev/null || true
            npx pm2 start npm --name haccp-online --cwd "$(pwd)" -- start 2>&1 | tail -5
            npx pm2 status haccp-online --no-color

            echo "=== Deploy complete ==="
