name: Deploy to production

on:
  push:
    branches: [master]

env:
  APP_DIR: www/wesetup.ru/app

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deploy tarball
        run: |
          echo "${{ github.sha }}" > .build-sha
          echo "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > .build-time
          tar cf deploy.tar \
            --exclude=node_modules \
            --exclude=.next \
            --exclude=.git \
            --exclude=.github \
            --exclude=.claude \
            --exclude=.vscode \
            --exclude=_run.py \
            --exclude=_deploy.py \
            --exclude=_seed_remote.py \
            --exclude=haccp-deploy.tar \
            --exclude='*.tar' \
            --exclude='*.tar.gz' \
            --exclude=test.txt \
            .

      - name: Prepare app directory
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          password: ${{ secrets.DEPLOY_SSH_PASS }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          script: |
            mkdir -p ${{ env.APP_DIR }}
            # Backup .env if it exists
            [ -f ${{ env.APP_DIR }}/.env ] && cp ${{ env.APP_DIR }}/.env ${{ env.APP_DIR }}/.env.bak || true

      - name: Upload tarball via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          password: ${{ secrets.DEPLOY_SSH_PASS }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          source: deploy.tar
          target: ${{ env.APP_DIR }}

      - name: Run deploy commands
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          password: ${{ secrets.DEPLOY_SSH_PASS }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          timeout: 600s
          command_timeout: 10m
          script: |
            set -e
            cd ${{ env.APP_DIR }}

            echo "=== Extracting tarball ==="
            tar xf deploy.tar && rm deploy.tar
            # Restore .env from backup if it exists
            [ -f .env.bak ] && cp .env.bak .env || true

            echo "=== Installing dependencies ==="
            source ~/.nvm/nvm.sh 2>/dev/null || true
            npm install 2>&1 | tail -5

            echo "=== Generating Prisma client ==="
            npx prisma generate 2>&1 | tail -5

            echo "=== Pushing schema to DB ==="
            npx prisma db push 2>&1 | tail -5

            echo "=== Building ==="
            npm run build 2>&1 | tail -10

            echo "=== Restarting PM2 ==="
            npx pm2 restart haccp-online 2>&1 | tail -5 || npx pm2 start npm --name haccp-online -- start 2>&1 | tail -5

            echo "=== Deploy complete ==="
