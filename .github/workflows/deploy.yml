name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            export PATH="$HOME/.nvm/versions/node/v24.12.0/bin:$PATH"
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            # Диагностика что реально в secret (без раскрытия содержимого):
            echo "DEPLOY_PATH length: ${#DEPLOY_PATH}"
            echo "DEPLOY_PATH hex dump (первые/последние байты):"
            echo -n "$DEPLOY_PATH" | head -c 10 | od -c | head -1
            echo -n "$DEPLOY_PATH" | tail -c 10 | od -c | head -1
            # Пробуем fallback-пути если DEPLOY_PATH с ошибкой:
            for p in "$DEPLOY_PATH" /var/www/tasksflow/data/www/tasksflow.ru; do
              if [ -d "$p" ] && [ -f "$p/package.json" ]; then
                echo "Using working dir: $p"
                cd "$p"
                break
              fi
            done
            pwd
            [ -f package.json ] || { echo "FATAL: package.json не найден в $(pwd)"; exit 1; }
            git pull origin main
            git log --oneline -1
            npm install
            # ВАЖНО: db:push убран из автодеплоя - он может удалять данные!
            # Миграции БД выполнять ВРУЧНУЮ: npm run add-companies, npm run update-tasks
            # Идемпотентная миграция api_keys (CREATE IF NOT EXISTS) — безопасна:
            npm run create-api-keys-table || echo "api_keys migration failed (non-fatal)"
            npm run build
            ls -la dist/
            grep -c "api-keys" dist/index.cjs || echo "api-keys not found in build"
            # Если процесс отсутствует (удалён) — start, иначе restart:
            pm2 describe tasksflow > /dev/null 2>&1 && pm2 restart tasksflow --update-env || pm2 start dist/index.cjs --name tasksflow --cwd "$DEPLOY_PATH"
            pm2 save
            pm2 status
            sleep 3
            pm2 logs tasksflow --lines 30 --nostream || true
