name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            export PATH="$HOME/.nvm/versions/node/v24.12.0/bin:$PATH"
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin main
            git log --oneline -1
            npm install
            # ВАЖНО: db:push убран из автодеплоя - он может удалять данные!
            # Миграции БД выполнять ВРУЧНУЮ: npm run add-companies, npm run update-tasks
            # Идемпотентные миграции (CREATE IF NOT EXISTS) — безопасно гонять каждый деплой:
            npm run create-api-keys-table || echo "create-api-keys-table failed (non-fatal)"
            npm run build
            ls -la dist/index.cjs
            grep -c "api-keys" dist/index.cjs || echo "api-keys not found in build"
            # Полный рестарт — delete+start вместо restart,
            # т.к. restart может закешировать старый код в RAM:
            pm2 delete tasksflow 2>/dev/null || true
            pm2 start dist/index.cjs --name tasksflow
            pm2 save
            pm2 status
