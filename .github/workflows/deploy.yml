name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  # Serialize, но БЕЗ отмены текущего. Раньше cancel-in-progress: true
  # убивал run при следующем push'е, и если series быстрых пушей шли в
  # пределах 1–3 минут (npm ci ещё не завершился), каждый кроме последнего
  # отменялся до pm2 reload — фиксы оставались в репо, на прод не
  # докатывались.
  #
  # С false: GH Actions держит одну активную и одну pending. Третий push
  # вытесняет pending (его коммит уже есть в коде четвёртого, ничего не
  # теряем), но активная всегда докатывается до pm2 reload. Минус —
  # потратим больше CI-минут при пиковой активности; плюс — гарантия,
  # что прод догоняет master.
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -Eeuo pipefail

            export PATH="$HOME/.nvm/versions/node/v24.12.0/bin:$PATH"

            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            if [ -z "$DEPLOY_PATH" ] || [ ! -f "$DEPLOY_PATH/package.json" ]; then
              DEPLOY_PATH="/var/www/tasksflow/data/www/tasksflow.ru"
            fi

            cd "$DEPLOY_PATH"
            [ -f package.json ] || { echo "FATAL: package.json not found in $(pwd)"; exit 1; }

            echo ">>> sync with origin/main (hard reset)"
            # Прод — чистая deploy-копия, ручных правок тут быть не должно.
            # Раньше использовали git pull --ff-only, но npm ci/install
            # иногда трогает package-lock.json, и pull падает с
            # «local changes would be overwritten». Теперь делаем
            # fetch + reset --hard origin/main: гарантированно ровно
            # то, что в репо. Если что-то отброшено — видно в логе.
            git fetch origin main
            DIRTY="$(git status --short)"
            if [ -n "$DIRTY" ]; then
              echo "WARNING: discarding local changes before reset:"
              echo "$DIRTY"
            fi
            git reset --hard origin/main
            git log --oneline -1

            DEPS_STAMP=".deploy-deps.sha256"
            DEPS_HASH="$(sha256sum package.json package-lock.json | sha256sum | awk '{print $1}')"
            if [ ! -d node_modules ] || [ ! -f "$DEPS_STAMP" ] || [ "$(cat "$DEPS_STAMP")" != "$DEPS_HASH" ]; then
              echo ">>> dependencies changed: npm ci"
              npm ci --no-audit --fund=false --prefer-offline
              echo "$DEPS_HASH" > "$DEPS_STAMP"
            else
              echo ">>> dependencies unchanged: skip npm ci"
            fi

            echo ">>> mysqldump BEFORE migrations (safety net)"
            # 28.04.2026 prod БД была wipe'нута через ручной drizzle-kit
            # push --force, backup'а не было — потеряли tasks/invitations
            # навсегда. Теперь перед каждым deploy делаем dump в
            # ~/backups/tasksflow-YYYY-MM-DD-HH-mm-ss.sql.gz. Ротация 30
            # дней. Если этот шаг упал — DEPLOY ABORT (а не non-fatal!),
            # потому что без бэкапа продолжать опасно.
            npm run backup-db

            echo ">>> safe migrations"
            npm run create-api-keys-table || echo "api_keys migration failed (non-fatal)"
            npm run create-invitations-table || echo "invitations migration failed (non-fatal)"
            npm run add-claim-col || echo "claim col migration failed (non-fatal)"
            npm run add-managed-workers-col || echo "managed-workers col migration failed (non-fatal)"
            npm run add-position-col || echo "position col migration failed (non-fatal)"
            npm run add-api-key-encrypted || echo "api-key-encrypted migration failed (non-fatal)"

            echo ">>> build"
            npm run build

            echo ">>> reload app"
            if pm2 describe tasksflow > /dev/null 2>&1; then
              pm2 reload tasksflow --update-env || pm2 restart tasksflow --update-env
            else
              pm2 start dist/index.cjs --name tasksflow --cwd "$DEPLOY_PATH"
              pm2 save
            fi

            pm2 status
