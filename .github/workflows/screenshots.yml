name: Capture screenshots (DISABLED)

# Disabled per operator request 2026-04-18 — no auto schedule, no auto fire
# after deploy. `workflow_dispatch` kept so the workflow can still be run
# manually from the Actions tab when explicitly needed. To fully re-enable,
# restore the original `on:` block from git history.
on:
  workflow_dispatch:

env:
  APP_DIR: /var/www/wesetupru/data/www/wesetup.ru/app
  BASE_URL: https://wesetup.ru

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Belt-and-braces guard: even if someone accidentally re-adds an `on:`
    # trigger above, the job won't run until this line is flipped.
    if: ${{ github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Capture screenshots against prod
        env:
          BASE_URL: ${{ env.BASE_URL }}
          DEMO_SCREENSHOT_EMAIL: ${{ secrets.DEMO_SCREENSHOT_EMAIL }}
          DEMO_SCREENSHOT_PASSWORD: ${{ secrets.DEMO_SCREENSHOT_PASSWORD }}
        run: npx tsx scripts/capture-screenshots.ts

      - name: Report artefact size
        run: |
          echo "== captured files =="
          find public/screenshots -type f | wc -l
          du -sh public/screenshots

      - name: Upload screenshots as CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: wesetup-screenshots-${{ github.run_id }}
          path: public/screenshots
          retention-days: 30

      - name: SCP to prod
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          password: ${{ secrets.DEPLOY_SSH_PASS }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          source: "public/screenshots/*"
          target: ${{ env.APP_DIR }}/public/screenshots
          strip_components: 2
          rm: false

      - name: Summary
        run: |
          echo "Captured screenshots are live at https://wesetup.ru/screenshots/{desktop,tablet,mobile}/<slug>.png"
