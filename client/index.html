  </head>
  <body>
    <!-- Anti-flash тема: ставим .dark на <html> ДО React-mount, чтобы
         браузер сразу отрисовал нужную палитру и не мигал светлым
         фоном на dark-предпочтении. Источник:
           1) localStorage('theme-preference') = 'light'|'dark'|'system'
           2) при 'system' или отсутствии — prefers-color-scheme
         Та же логика дублируется в client/src/contexts/ThemeContext.tsx,
         но React-апдейт приходит после маунта, а скрипт работает
         сразу — отсюда дубль для UX. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme-preference');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var isDark = stored === 'dark' || ((stored === 'system' || !stored) && prefersDark);
          if (isDark) document.documentElement.classList.add('dark');
        } catch (e) { /* localStorage недоступен — light по умолчанию */ }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Регистрация Service Worker для PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered:', reg.scope))
            .catch(err => console.log('SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
